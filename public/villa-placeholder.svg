<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Photo unavailable">
  <!-- BVT editorial placeholder: dark elevated bg, cream hairline + mark -->
  <rect width="400" height="300" fill="#0e131c"/>
  <rect x="0.5" y="0.5" width="399" height="299" fill="none" stroke="#2a3140" stroke-width="1"/>

  <!-- subtle tonal gradient to avoid a flat box -->
  <defs>
    <linearGradient id="bvtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121826" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0e16" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="398" height="298" fill="url(#bvtGrad)"/>

  <!-- center mark: hairline + BVT wordmark + caption -->
  <g transform="translate(200 150)" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <line x1="-28" y1="-32" x2="28" y2="-32" stroke="#d4943a" stroke-width="1.2"/>
    <text y="0" fill="#e8e4dc" font-size="34" font-style="italic" letter-spacing="2">BVT</text>
    <text y="32" fill="#8a8577" font-size="10" font-family="ui-sans-serif, system-ui, sans-serif" letter-spacing="2.2" style="text-transform: uppercase;">Photo unavailable</text>
  </g>
</svg>
